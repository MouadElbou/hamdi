name: Release Desktop

on:
  push:
    tags:
      - 'desktop-v*'

jobs:
  release:
    name: Build & Publish Windows Installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: stock-platform/package-lock.json

      - name: Install dependencies
        working-directory: stock-platform
        run: npm ci

      - name: Build shared package
        working-directory: stock-platform
        run: npm run build:shared

      - name: Build & publish desktop app
        working-directory: stock-platform/packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-vite build
          npx electron-builder --publish always
